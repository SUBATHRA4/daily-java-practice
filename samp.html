<!DOCTYPE html>
<html>
<head>
    <title>Timer</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-family: Arial, sans-serif;
        }

        #timer {
            font-size: 40px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="timer">00:00:00</div>

    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="resetTimer()">Reset</button>

    <script>
        let hours = 0;
        let minutes = 0;
        let seconds = 0;
        let timer = null;

        function updateDisplay() {
            let h = String(hours).padStart(2, '0');
            let m = String(minutes).padStart(2, '0');
            let s = String(seconds).padStart(2, '0');

            document.getElementById("timer").innerText =
                `${h}:${m}:${s}`;
        }

        function startTimer() {
            if (timer !== null) return;

            timer = setInterval(() => {
                seconds++;

                if (seconds === 60) {
                    seconds = 0;
                    minutes++;
                }

                if (minutes === 60) {
                    minutes = 0;
                    hours++;
                }

                updateDisplay();
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
            timer = null;
        }

        function resetTimer() {
            stopTimer();

            hours = 0;
            minutes = 0;
            seconds = 0;

            updateDisplay();
        }
    </script>

</body>
</html>
